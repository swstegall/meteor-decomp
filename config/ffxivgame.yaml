#     owner: null                # github handle or null while unclaimed
#     seed_source: rtti+__FILE__ # how we discovered the name
#     notes: null                # optional one-line context
#
# Until Phase 1 runs, this file holds two example rows so the schema is
# documented + tools/progress.py exercises a real path.

